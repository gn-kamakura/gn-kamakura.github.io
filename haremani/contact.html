<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ ― はれまに</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Shippori+Mincho+B1:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1E2530; --mist: #B7C4CE; --mist-dim: #8894A0;
    --paper: #F6F3EC; --paper-dim: #ECE7DA;
    --clarity: #7FA396; --clarity-deep: #5C8478; --plum: #8B5A6B;
    --text-dark: #232833; --text-soft: #5B6472;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse 120% 80% at 50% -10%, #F4F6F2 0%, #E9EDE6 55%, #E0E5DD 100%);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: var(--text-dark);
  }
  a { color: var(--clarity-deep); }
  .app { max-width: 560px; margin: 0 auto; padding: 40px 20px 90px; }

  .top-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand-name {
    font-family: 'Shippori Mincho B1', serif; font-size: 18px; font-weight: 600;
    color: var(--text-dark); letter-spacing: 0.08em;
  }
  .back-link { font-size: 12px; color: var(--text-soft); }

  h1 { font-family: 'Shippori Mincho', serif; font-size: 24px; font-weight: 600; margin-bottom: 10px; }
  .lead { font-size: 13px; line-height: 1.9; color: var(--text-soft); margin-bottom: 36px; }

  .doc-card {
    background: var(--paper);
    border-radius: 18px;
    padding: 32px 28px;
    box-shadow: 0 24px 60px -20px rgba(0,0,0,0.3), 0 2px 0 rgba(255,255,255,0.4) inset;
  }

  .form-group { margin-bottom: 20px; }
  .form-group:last-of-type { margin-bottom: 0; }

  label {
    display: block;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 8px;
  }
  label .opt { color: var(--text-soft); font-weight: 400; font-size: 11px; margin-left: 4px; }

  input, textarea {
    width: 100%;
    background: #FFFDF8;
    border: 1.5px solid #DCD5C4;
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13.5px;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.2s ease;
  }
  input:focus, textarea:focus { border-color: var(--clarity); }
  textarea { min-height: 130px; resize: vertical; line-height: 1.8; }

  button.submit-btn {
    width: 100%;
    appearance: none;
    border: none;
    background: var(--ink);
    color: var(--paper);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13.5px;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: 14px;
    border-radius: 999px;
    cursor: pointer;
    margin-top: 28px;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  button.submit-btn:hover:not(:disabled) { background: var(--clarity-deep); transform: translateY(-1px); }
  button.submit-btn:disabled { opacity: 0.5; cursor: default; }

  .form-note { font-size: 11px; color: var(--text-soft); text-align: center; margin-top: 14px; }

  .status-msg {
    display: none;
    font-size: 12.5px;
    line-height: 1.85;
    padding: 14px 16px;
    border-radius: 10px;
    margin-top: 18px;
  }
  .status-msg.show { display: block; }
  .status-msg.success { background: rgba(127,163,150,0.14); border: 1px solid rgba(127,163,150,0.4); color: var(--clarity-deep); }
  .status-msg.error { background: rgba(139,90,107,0.1); border: 1px solid rgba(139,90,107,0.3); color: var(--plum); }

  .contact-alt {
    margin-top: 24px;
    text-align: center;
    font-size: 12px;
    color: var(--text-soft);
  }
</style>
</head>
<body>
<div class="app">

  <div class="top-header">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="19" fill="#232833"/>
        <path d="M5 27.5 L13.5 17.5 L16.5 20.3 L20 14 L23.5 20.3 L26.5 17.5 L35 27.5 Z" fill="#FFFFFF"/>
      </svg>
      <span class="brand-name">はれまに</span>
    </div>
    <a href="./index.html" class="back-link">← トップに戻る</a>
  </div>

  <h1>お問い合わせ</h1>
  <p class="lead">ご質問・ご要望・不具合のご報告など、お気軽にご連絡ください。通常2営業日以内にご返信いたします。</p>

  <div class="doc-card">
    <form id="contactForm" action="https://formspree.io/f/info@gn-kamakura.com" method="POST">
      <div class="form-group">
        <label for="name">お名前<span class="opt">任意</span></label>
        <input type="text" id="name" name="name" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="message">お問い合わせ内容</label>
        <textarea id="message" name="message" required placeholder="お問い合わせ内容をご記入ください"></textarea>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">送信する</button>
      <p class="form-note">送信いただいた内容は、お問い合わせ対応の目的以外には使用しません。</p>
      <div class="status-msg" id="statusMsg"></div>
    </form>
  </div>

  <p class="contact-alt">フォームがうまく送信できない場合は、<a href="mailto:info@gn-kamakura.com">info@gn-kamakura.com</a> まで直接ご連絡ください。</p>

</div>

<script>
  const form = document.getElementById('contactForm');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = '送信しています…';
    statusMsg.className = 'status-msg';

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: new FormData(form)
      });
      if (res.ok) {
        statusMsg.textContent = 'お問い合わせを送信しました。ありがとうございます。';
        statusMsg.classList.add('show', 'success');
        form.reset();
        submitBtn.textContent = '送信しました';
      } else {
        throw new Error('送信に失敗しました');
      }
    } catch (err) {
      statusMsg.textContent = '送信に失敗しました。お手数ですが info@gn-kamakura.com まで直接ご連絡ください。';
      statusMsg.classList.add('show', 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = '送信する';
    }
  });
</script>

</body>
</html>
