<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ — AI本質力トレーニング</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--deep:#04201A;--forest:#085041;--primary:#1D9E75;--gold:#E8C87A;--text:#F5F0E8;--muted:rgba(245,240,232,0.55);--border:rgba(200,169,110,0.2);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--deep);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;line-height:1.8;min-height:100vh;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.25rem 4rem;display:flex;align-items:center;justify-content:space-between;background:rgba(4,32,26,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.nav-logo{text-decoration:none;display:flex;align-items:center;gap:10px;}
.logo-block{width:44px;height:44px;background:#085041;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;gap:0;}
.logo-block-think{font-family:'Noto Sans JP',sans-serif;font-size:7px;color:white;font-weight:300;letter-spacing:0.1em;line-height:1.8;}
.logo-block-text{font-family:'Noto Sans JP',sans-serif;font-size:15px;color:white;font-weight:700;line-height:1.1;}
.logo-block-line{width:30px;height:2px;background:#1D9E75;margin-top:3px;}
.nav-logo-name{font-family:'Noto Sans JP',sans-serif;font-size:0.95rem;font-weight:500;color:var(--text);}
.nav-back{color:var(--muted);text-decoration:none;font-size:0.85rem;transition:color 0.2s;}
.nav-back:hover{color:var(--text);}

.page{padding:9rem 4rem 6rem;max-width:760px;margin:0 auto;}
.page-label{font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.25em;color:var(--primary);text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;}
.page-label::before{content:'';display:block;width:30px;height:1px;background:var(--primary);}
.page-title{font-family:'Noto Serif JP',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;line-height:1.3;margin-bottom:1rem;}
.page-desc{font-size:0.95rem;color:var(--muted);line-height:2;margin-bottom:3rem;max-width:560px;}

.form-card{background:rgba(8,80,65,0.2);border:1px solid var(--border);border-radius:16px;padding:2.5rem;}
.form-group{margin-bottom:1.75rem;}
.form-label{display:block;font-size:0.85rem;font-weight:500;color:var(--text);margin-bottom:0.6rem;letter-spacing:0.02em;}
.form-label span{color:var(--primary);margin-left:0.25rem;font-size:0.75rem;}
.form-label .opt{color:var(--muted);margin-left:0.25rem;font-size:0.75rem;}
.form-input,.form-select,.form-textarea{width:100%;background:rgba(4,32,26,0.6);border:1px solid rgba(200,169,110,0.25);border-radius:8px;padding:0.85rem 1rem;font-size:0.9rem;color:var(--text);font-family:'Noto Sans JP',sans-serif;transition:border-color 0.2s;outline:none;}
.form-input::placeholder,.form-textarea::placeholder{color:rgba(245,240,232,0.25);}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:rgba(29,158,117,0.6);background:rgba(8,80,65,0.3);}
.form-select{appearance:none;cursor:pointer;}
.form-select option{background:#04201A;color:var(--text);}
.form-textarea{min-height:160px;resize:vertical;line-height:1.8;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.form-divider{border:none;border-top:1px solid var(--border);margin:2rem 0;}
.form-section-title{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:600;color:var(--gold);margin-bottom:1.5rem;}

.submit-btn{width:100%;background:var(--primary);color:white;border:none;padding:1.1rem;border-radius:100px;font-size:1rem;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:0.02em;transition:all 0.25s;margin-top:0.5rem;}
.submit-btn:hover{background:#24b885;transform:translateY(-1px);box-shadow:0 8px 30px rgba(29,158,117,0.3);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.privacy-note{font-size:0.75rem;color:var(--muted);text-align:center;margin-top:1rem;line-height:1.8;}
.privacy-note a{color:var(--primary);text-decoration:none;}

.success-msg{display:none;background:rgba(29,158,117,0.15);border:1px solid rgba(29,158,117,0.4);border-radius:12px;padding:2rem;text-align:center;margin-top:2rem;}
.success-msg.show{display:block;}
.success-msg h3{font-family:'Noto Serif JP',serif;font-size:1.2rem;font-weight:600;margin-bottom:0.75rem;color:var(--primary);}
.success-msg p{font-size:0.88rem;color:var(--muted);line-height:2;}

@media(max-width:640px){
  nav{padding:1.25rem 1.5rem;}
  .page{padding:7rem 1.5rem 4rem;}
  .form-card{padding:1.5rem;}
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<nav>
  <a href="/honshitsu/" class="nav-logo">
    <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDI0IiBoZWlnaHQ9IjEwMjQiIHZpZXdCb3g9IjAgMCAxMDI0IDEwMjQiPjxyZWN0IHdpZHRoPSIxMDI0IiBoZWlnaHQ9IjEwMjQiIHJ4PSIyMzAiIGZpbGw9IiMwODUwNDEiLz48dGV4dCB4PSI1MTIiIHk9IjMxMCIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTAwIiBmb250LXdlaWdodD0iMzAwIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgbGV0dGVyLXNwYWNpbmc9IjE4Ij5USElOSzwvdGV4dD48dGV4dCB4PSI1MTIiIHk9IjYyMCIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMjgwIiBmb250LXdlaWdodD0iNzAwIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+QUnmnKzos6o8L3RleHQ+PHJlY3QgeD0iMTk2IiB5PSI3MTAiIHdpZHRoPSI2MzIiIGhlaWdodD0iMjAiIHJ4PSIxMCIgZmlsbD0iIzFEOUU3NSIvPjwvc3ZnPg==" alt="AI本質力" style="width:44px;height:44px;border-radius:14px;display:block;flex-shrink:0;">
    </div>
    <span class="nav-logo-name">AI本質力トレーニング</span>
  </a>
  <a href="/honshitsu/" class="nav-back">← LPに戻る</a>
</nav>

<div class="page">
  <p class="page-label">CONTACT</p>
  <h1 class="page-title">お問い合わせ</h1>
  <p class="page-desc">法人プランのご検討・研修への組み込みなど、ご不明な点はお気軽にご連絡ください。通常2営業日以内にご返信いたします。</p>

  <div class="form-card">
    <form id="contactForm" action="https://formspree.io/f/info@gn-kamakura.com" method="POST">

      <p class="form-section-title">お客様情報</p>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">お名前<span>*</span></label>
          <input type="text" name="name" class="form-input" placeholder="山田 太郎" required>
        </div>
        <div class="form-group">
          <label class="form-label">会社名<span>*</span></label>
          <input type="text" name="company" class="form-input" placeholder="株式会社〇〇" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">メールアドレス<span>*</span></label>
          <input type="email" name="email" class="form-input" placeholder="example@company.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">電話番号<span class="opt">任意</span></label>
          <input type="tel" name="phone" class="form-input" placeholder="03-0000-0000">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">部署・役職<span class="opt">任意</span></label>
        <input type="text" name="department" class="form-input" placeholder="人事部 マネージャー">
      </div>

      <hr class="form-divider">
      <p class="form-section-title">お問い合わせ内容</p>

      <div class="form-group">
        <label class="form-label">お問い合わせ種別<span>*</span></label>
        <select name="type" class="form-select form-input" required>
          <option value="" disabled selected>選択してください</option>
          <option value="corporate_plan">法人プランについて</option>
          <option value="training">新入社員研修・育成プログラムへの組み込み</option>
          <option value="pricing">料金・見積もりについて</option>
          <option value="demo">デモ・トライアルのご要望</option>
          <option value="other">その他</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">想定人数<span class="opt">任意</span></label>
        <select name="team_size" class="form-select form-input">
          <option value="" disabled selected>選択してください</option>
          <option value="1-10">1〜10名</option>
          <option value="11-50">11〜50名</option>
          <option value="51-100">51〜100名</option>
          <option value="101-500">101〜500名</option>
          <option value="500+">500名以上</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">ご質問・ご要望<span>*</span></label>
        <textarea name="message" class="form-textarea" placeholder="ご質問・ご要望をご記入ください。" required></textarea>
      </div>

      <input type="hidden" name="_subject" value="【AI本質力】法人プランお問い合わせ">
      <input type="hidden" name="_replyto" value="info@gn-kamakura.com">

      <button type="submit" class="submit-btn" id="submitBtn">送信する →</button>
      <p class="privacy-note">送信内容は<a href="/honshitsu/privacy">プライバシーポリシー</a>に従って取り扱います。</p>
    </form>

    <div class="success-msg" id="successMsg">
      <h3>お問い合わせを受け付けました</h3>
      <p>ご連絡ありがとうございます。<br>通常2営業日以内にご返信いたします。<br>しばらくお待ちください。</p>
    </div>
  </div>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    const formData = new FormData(this);
    const res = await fetch(this.action, {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    });

    if (res.ok) {
      this.style.display = 'none';
      document.getElementById('successMsg').classList.add('show');
    } else {
      throw new Error();
    }
  } catch {
    btn.disabled = false;
    btn.textContent = '送信する →';
    alert('送信に失敗しました。恐れ入りますが info@gn-kamakura.com までご連絡ください。');
  }
});
</script>

</body>
</html>
